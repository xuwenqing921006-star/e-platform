<svg xmlns="http://www.w3.org/2000/svg" width="680" height="1180" viewBox="0 0 680 1180" role="img" aria-label="[Mock] 县域征信服务网点示意长图">
  <rect width="680" height="1180" fill="#f5f8ff"/>
  <rect x="44" y="44" width="592" height="1092" rx="18" fill="#ffffff" stroke="#d8e3f5" stroke-width="3"/>
  <text x="80" y="112" fill="#172033" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700">[Mock] 县域征信服务网点</text>
  <text x="80" y="164" fill="#647895" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22">征信查询办理渠道与咨询方式示意</text>
  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="80" y="218" width="520" height="120" rx="12" fill="#eaf1ff"/>
    <text x="112" y="268" fill="#1556d1" font-size="26" font-weight="700">肇州县服务点</text>
    <text x="112" y="308" fill="#33425c" font-size="22">地址：县政务服务大厅一楼征信窗口</text>
    <rect x="80" y="378" width="520" height="120" rx="12" fill="#f3f6fb"/>
    <text x="112" y="428" fill="#1556d1" font-size="26" font-weight="700">肇源县服务点</text>
    <text x="112" y="468" fill="#33425c" font-size="22">地址：县金融服务中心综合窗口</text>
    <rect x="80" y="538" width="520" height="120" rx="12" fill="#eaf1ff"/>
    <text x="112" y="588" fill="#1556d1" font-size="26" font-weight="700">林甸县服务点</text>
    <text x="112" y="628" fill="#33425c" font-size="22">地址：县政务大厅人民银行服务窗口</text>
    <rect x="80" y="698" width="520" height="120" rx="12" fill="#f3f6fb"/>
    <text x="112" y="748" fill="#1556d1" font-size="26" font-weight="700">杜蒙县服务点</text>
    <text x="112" y="788" fill="#33425c" font-size="22">地址：县便民服务中心金融专区</text>
    <rect x="80" y="886" width="520" height="172" rx="12" fill="#fff8e8" stroke="#f2d38a"/>
    <text x="112" y="940" fill="#9a6500" font-size="26" font-weight="700">办理提示</text>
    <text x="112" y="988" fill="#33425c" font-size="22">请携带有效身份证件，具体工作时间以</text>
    <text x="112" y="1026" fill="#33425c" font-size="22">服务网点现场公示为准。</text>
