name: central-bank-e-platform-prod

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-central_bank_e_platform}
      MYSQL_USER: ${MYSQL_USER:-central_bank}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/ry_20260417.sql:/docker-entrypoint-initdb.d/10-ruoyi-base.sql:ro
      - ./backend/sql/quartz.sql:/docker-entrypoint-initdb.d/20-quartz.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_schema_mysql.sql:/docker-entrypoint-initdb.d/30-central-bank-schema.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_seed_mysql.sql:/docker-entrypoint-initdb.d/40-central-bank-seed.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_content_menu.sql:/docker-entrypoint-initdb.d/50-central-bank-content-menu.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_product_menu.sql:/docker-entrypoint-initdb.d/60-central-bank-product-menu.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_account_menu.sql:/docker-entrypoint-initdb.d/70-central-bank-account-menu.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_audit_log_menu.sql:/docker-entrypoint-initdb.d/80-central-bank-audit-log-menu.sql:ro
      - ./backend/central-bank-business/src/main/resources/sql/central_bank_admin_menu_cleanup.sql:/docker-entrypoint-initdb.d/90-central-bank-admin-menu-cleanup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8003
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-central_bank_e_platform}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=GMT%2B8
      DB_USERNAME: ${MYSQL_USER:-central_bank}
      DB_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      APP_STORAGE_ROOT: /app/uploads
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET}
      DRUID_LOGIN_USERNAME: ${DRUID_LOGIN_USERNAME:?set DRUID_LOGIN_USERNAME}
      DRUID_LOGIN_PASSWORD: ${DRUID_LOGIN_PASSWORD:?set DRUID_LOGIN_PASSWORD}
      REFERER_ALLOWED_DOMAINS: ${REFERER_ALLOWED_DOMAINS:?set REFERER_ALLOWED_DOMAINS}
    volumes:
      - app_uploads:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ruoyi-ui/dist:/usr/share/nginx/html/admin:ro
      - ./frontend/dist:/usr/share/nginx/html/h5:ro

volumes:
  mysql_data:
  redis_data:
  app_uploads:
